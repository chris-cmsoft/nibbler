<svg viewBox="0 0 360 280" xmlns="http://www.w3.org/2000/svg" aria-label="Animated cute PHP elephant">
    <style>
        .elephpant {
            animation: elephpantIdle 3s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center bottom;
        }

        .ear-left {
            animation: earLeftFlap 4.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: 114px 122px;
        }

        .ear-right {
            animation: earRightFlap 4.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: 246px 122px;
        }

        .trunk {
            animation: trunkCurl 3.4s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: 180px 150px;
        }

        .eyes {
            animation: elephpantBlink 5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes elephpantIdle {
            0%, 100% {
                transform: translateY(0) rotate(-0.6deg);
            }

            50% {
                transform: translateY(-7px) rotate(0.8deg);
            }
        }

        @keyframes earLeftFlap {
            0%, 78%, 100% {
                transform: rotate(0);
            }

            84% {
                transform: rotate(-7deg);
            }

            90% {
                transform: rotate(4deg);
            }
        }

        @keyframes earRightFlap {
            0%, 78%, 100% {
                transform: rotate(0);
            }

            84% {
                transform: rotate(7deg);
            }

            90% {
                transform: rotate(-4deg);
            }
        }

        @keyframes trunkCurl {
            0%, 100% {
                transform: rotate(-2deg);
            }

            50% {
                transform: rotate(5deg) translateY(3px);
            }
        }

        @keyframes elephpantBlink {
            0%, 91%, 100% {
                transform: scaleY(1);
            }

            94%, 96% {
                transform: scaleY(0.18);
            }
        }
    </style>

    <g class="elephpant">
        <ellipse cx="180" cy="211" rx="95" ry="18" fill="#c8d2ec" opacity="0.42"/>
        <g class="ear-left">
            <path d="M120 92 C72 84 48 120 60 163 C70 199 111 205 137 176 C155 156 151 111 120 92 Z" fill="#7d8fd3"/>
            <path d="M115 108 C84 105 69 130 76 159 C83 185 113 189 130 168 C143 151 139 119 115 108 Z" fill="#a9b7ef"/>
        </g>
        <g class="ear-right">
            <path d="M240 92 C288 84 312 120 300 163 C290 199 249 205 223 176 C205 156 209 111 240 92 Z" fill="#7d8fd3"/>
            <path d="M245 108 C276 105 291 130 284 159 C277 185 247 189 230 168 C217 151 221 119 245 108 Z" fill="#a9b7ef"/>
        </g>
        <ellipse cx="180" cy="143" rx="78" ry="68" fill="#8899dc"/>
        <path d="M137 96 C143 68 164 50 180 50 C196 50 217 68 223 96" fill="none" stroke="#6f80ca" stroke-width="18" stroke-linecap="round"/>
        <g class="trunk">
            <path d="M173 155 C169 181 169 213 191 222 C212 230 228 211 218 194" fill="none" stroke="#8899dc" stroke-width="28" stroke-linecap="round"/>
            <path d="M206 204 C215 207 224 203 227 195" fill="none" stroke="#6f80ca" stroke-width="6" stroke-linecap="round"/>
        </g>
        <ellipse cx="156" cy="154" rx="10" ry="7" fill="#6575bd"/>
        <ellipse cx="204" cy="154" rx="10" ry="7" fill="#6575bd"/>
        <g class="eyes">
            <circle cx="153" cy="128" r="6" fill="#20233a"/>
            <circle cx="207" cy="128" r="6" fill="#20233a"/>
        </g>
        <path d="M163 91 C171 84 189 84 197 91" fill="none" stroke="#f1d36d" stroke-width="8" stroke-linecap="round"/>
        <path d="M139 101 C164 114 197 114 221 101" fill="none" stroke="#f1d36d" stroke-width="7" stroke-linecap="round"/>
        <rect x="128" y="84" width="104" height="48" rx="24" fill="#6b78c8"/>
        <text x="180" y="116" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="31" font-weight="700" fill="#f7f1b4">PHP</text>
        <path d="M120 195 L105 232" stroke="#7687cf" stroke-width="26" stroke-linecap="round"/>
        <path d="M240 195 L255 232" stroke="#7687cf" stroke-width="26" stroke-linecap="round"/>
        <path d="M151 198 L145 236" stroke="#7e8fd4" stroke-width="28" stroke-linecap="round"/>
        <path d="M209 198 L215 236" stroke="#7e8fd4" stroke-width="28" stroke-linecap="round"/>
        <path d="M91 236 H119" stroke="#eef1fb" stroke-width="6" stroke-linecap="round"/>
        <path d="M131 239 H159" stroke="#eef1fb" stroke-width="6" stroke-linecap="round"/>
        <path d="M201 239 H229" stroke="#eef1fb" stroke-width="6" stroke-linecap="round"/>
        <path d="M241 236 H269" stroke="#eef1fb" stroke-width="6" stroke-linecap="round"/>
    </g>
</svg>
